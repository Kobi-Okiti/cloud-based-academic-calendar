services:
  - type: web
    name: lcu-academic-calendar-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://your-netlify-site.netlify.app
      - key: NOTIFY_WINDOW_MINUTES
        value: "5"
      - key: ENABLE_CRON
        value: "false"
